id: no-each-template-literal
valid:
  - |
    test.each([
      { input: 1, expected: "one" },
    ])("$input maps to $expected", ({ input, expected }) => {
      expect(formatNumber(input)).toBe(expected);
    });
  - |
    it.each([{ a: true, b: false }])("a is $a and b is $b", ({ a, b }) => {
      expect(a).not.toBe(b);
    });
invalid:
  - |
    it.each`input | expected
    ${1} | ${"one"}`("maps $input to $expected", ({ input, expected }) => {
      expect(formatNumber(input)).toBe(expected);
    });
