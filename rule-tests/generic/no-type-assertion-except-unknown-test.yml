id: no-type-assertion-except-unknown
valid:
  - "const name = formData.get(\"name\");"
  - "const data = response.data as unknown as User;"
  - 'const config = { theme: "dark" } as const;'
  - 'const config: Theme = { theme: "dark" } satisfies Theme;'
invalid:
  - 'const name = formData.get("name") as string;'
