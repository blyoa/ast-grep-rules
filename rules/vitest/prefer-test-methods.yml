id: prefer-test-methods
language: tsx
message: "Use `test` instead of `it` for `.only()`, `.skip()`, and `.each()` calls."
severity: error
files:
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/*.test.ts"
  - "**/*.test.tsx"
rule:
  pattern: it.$PROP($$$ARGS)
fix: test.$PROP($$$ARGS)
constraints:
  PROP:
    regex: "^(only|skip|each)$"
note: |
  Use `test` instead of `it` for `.only()`, `.skip()`, and `.each()` calls for consistency.

  Bad:  it.only("runs this test alone", () => { ... })
  Good: test.only("runs this test alone", () => { ... })
