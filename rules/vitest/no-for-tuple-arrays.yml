id: no-for-tuple-arrays
language: tsx
message: "Use objects instead of arrays for `for()` data."
severity: error
files:
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/*.test.ts"
  - "**/*.test.tsx"
rule:
  any:
    - pattern: test.for([[$$$]], $$$FN)
    - pattern: test.for([[$$$], $$$REST], $$$FN)
    - pattern: it.for([[$$$]], $$$FN)
    - pattern: it.for([[$$$], $$$REST], $$$FN)
note: |
  As the number of elements in each array increases, it becomes harder to understand which position corresponds to what intent.
  Objects allow named properties that are self-documenting.

  Bad:  test.for([[1, "one"], [2, "two"]], (input, expected) => { ... })
  Good: test.for([{ input: 1, expected: "one" }], ({ input, expected }) => { ... })
